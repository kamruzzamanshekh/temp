name: Self-Hosted Workflow

on:
  push:
    branches:
      - main

jobs:
  remote_server_job:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Activate venv and run tests
        shell: cmd
        run: |
          call D:\Personal_Workspace\CI_CD_QA\temp_qa\venv\Scripts\activate.bat
          cd /d D:\Personal_Workspace\CI_CD_QA\temp_qa
          echo Current directory:
          cd
          python --version
          pytest -v --html=report.html --self-contained-html --capture=tee-sys

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report
          path: D:\Personal_Workspace\CI_CD_QA\temp_qa\report.html