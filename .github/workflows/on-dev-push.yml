name: Run QA on Dev Push

on:
  repository_dispatch:
    types: [dev-push]

jobs:
  QA_Listeing_trigger_from_dev_repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4

      - name: Show trigger info
        run: echo "Triggered by dev repo push"

      - name: Run tests (example)
        run: |
          echo "Running QA tests..."
          # npm test / pytest / etc
    
  run_auto_scripts:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repo
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Python setup
        uses: actions/setup-python@v6   # <-- fixed typo '=' → '@'
        with:
          python-version: '3.12'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run the matrix.py file
      - name: Run scripts
        run: |
          pytest -v --html=report.html --self-contained-html --capture=tee-sys
      
      - name: Upload HTML report
        uses: actions/upload-artifact@v7
        with:
          name: pytest-html-report
          path: report.html
      
      - name: Send email with report link
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Selenium CI Report
          body: |
            ✅ Selenium test run is complete.
            Download the report artifact here:
            ${{ github.server_url }}/${
              { github.repository }}/actions/runs/${{ github.run_id }}
          to: shekhnstuiit@gmail.com
          from: GitHub Actions <${{ secrets.EMAIL_USER }}>